name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  NO_COLOR: "1"
  CONTROL_PLANE_PORT: "4000"
  WEB_PORT: "3000"
  PUBLIC_APP_URL: http://127.0.0.1:3000
  CONTROL_PLANE_URL: http://127.0.0.1:4000
  NEXT_PUBLIC_CONTROL_PLANE_URL: http://127.0.0.1:4000
  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pocket_cto
  TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pocket_cto_test
  ARTIFACT_S3_ENDPOINT: http://127.0.0.1:9000
  ARTIFACT_S3_REGION: us-east-1
  ARTIFACT_S3_BUCKET: pocket-cto-artifacts
  ARTIFACT_S3_ACCESS_KEY: minioadmin
  ARTIFACT_S3_SECRET_KEY: minioadmin
  ARTIFACT_S3_FORCE_PATH_STYLE: "true"
  SOURCE_OBJECT_PREFIX: sources
  CODEX_APP_SERVER_COMMAND: node
  CODEX_APP_SERVER_ARGS: --eval process.exit(0)
  CODEX_DEFAULT_MODEL: gpt-5.2-codex
  CODEX_DEFAULT_APPROVAL_POLICY: untrusted
  CODEX_DEFAULT_SANDBOX: workspace-write
  CODEX_DEFAULT_SERVICE_NAME: pocket-cto-ci
  WORKSPACE_ROOT: /tmp/pocket-cto-workspaces
  POCKET_CTO_SOURCE_REPO_ROOT: ${{ github.workspace }}

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Tool versions
        run: |
          node --version
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run static CI
        run: pnpm ci:static

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Start MinIO
        run: |
          docker run --detach \
            --name ci-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER="${ARTIFACT_S3_ACCESS_KEY}" \
            -e MINIO_ROOT_PASSWORD="${ARTIFACT_S3_SECRET_KEY}" \
            minio/minio:latest server /data
      - name: Tool versions
        run: |
          node --version
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create object storage bucket
        run: |
          docker run --rm \
            --network host \
            -e ARTIFACT_S3_ACCESS_KEY \
            -e ARTIFACT_S3_BUCKET \
            -e ARTIFACT_S3_ENDPOINT \
            -e ARTIFACT_S3_SECRET_KEY \
            --entrypoint /bin/sh \
            minio/mc:latest -c '
            set -eu
            until (/usr/bin/mc alias set local "$ARTIFACT_S3_ENDPOINT" "$ARTIFACT_S3_ACCESS_KEY" "$ARTIFACT_S3_SECRET_KEY") do
              echo "waiting for minio"
              sleep 1
            done
            /usr/bin/mc mb -p "local/$ARTIFACT_S3_BUCKET" || true
            /usr/bin/mc anonymous set none "local/$ARTIFACT_S3_BUCKET" || true
            '
      - name: Run integration DB CI
        run: pnpm ci:integration-db
